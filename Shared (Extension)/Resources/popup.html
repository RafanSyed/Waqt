<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 280px;
            padding: 16px;
            background: #05050f;
            color: white;
            font-family: -apple-system;
            margin: 0;
        }
        h2 { margin: 0 0 12px; font-size: 18px; }
        .row {
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .label { opacity: 0.5; font-size: 12px; margin-bottom: 4px; }
        .value { font-size: 20px; font-weight: 600; }
        .log {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 10px;
            font-size: 11px;
            opacity: 0.6;
            max-height: 120px;
            overflow-y: auto;
            font-family: monospace;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .green { background: #66cc99; }
        .red { background: #ff4444; }
        .yellow { background: #ffaa44; }
        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(to right, #66cc99, #33aadd);
            border: none;
            border-radius: 10px;
            color: black;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <h2>وقت · Waqt</h2>

    <div class="row">
        <div class="label">Time Remaining</div>
        <div class="value" id="remaining">...</div>
    </div>

    <div class="row">
        <div class="label">Status</div>
        <div id="status"><span class="status-dot yellow"></span>Checking...</div>
    </div>

    <div class="row">
        <div class="label">Last Action</div>
        <div class="log" id="log">Starting up...</div>
    </div>

    <button onclick="refresh()">Refresh</button>

    <script src="popup.js"></script>
</body>
</html>
